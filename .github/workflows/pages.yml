name: Deploy a GitHub Pages

# Despliega la app estática en GitHub Pages publicando en la rama `gh-pages`.
# No usa el entorno protegido `github-pages` (que falla tras el rename del repo):
# empuja el build con el GITHUB_TOKEN interno. Sirve si Pages está en modo "rama".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build (exportación estática)
        env:
          NEXT_OUTPUT_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Publicar en gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
