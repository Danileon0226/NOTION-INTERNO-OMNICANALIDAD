name: Deploy a GitHub Pages

# Despliega la app estática en GitHub Pages.
# No requiere ninguna credencial externa: usa el GITHUB_TOKEN interno.
# La URL queda en la salida del job (entorno github-pages).

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Configurar Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build (exportación estática)
        env:
          NEXT_OUTPUT_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
